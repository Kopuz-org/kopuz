name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test-suite:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v21
      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - uses: Swatinem/rust-cache@v2

      - name: Run workspace tests
        run: nix develop --command just test-ci

      - name: Check locale parity against en.ftl
        run: nix develop --command nu scripts/check_locales.nu

      - name: Check Rust i18n usage against en.ftl
        run: nix develop --command nu scripts/check_i18n_usage.nu

  pr-build:
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: macos-latest
            system: aarch64-darwin

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v21
      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Run Nix checks
        run: nix build .#checks.${{ matrix.system }}.default

  push-build:
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: macos-latest
            system: aarch64-darwin

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v21
      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - uses: cachix/cachix-action@v14
        with:
          name: kopuz
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build Nix package
        run: nix build .#packages.${{ matrix.system }}.default

      - name: Push result to Cachix
        run: cachix push kopuz result

  windows-build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build Windows app
        run: cargo build -p kopuz --locked
