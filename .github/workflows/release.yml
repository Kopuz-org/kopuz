name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  linux-tarball:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libopus-dev libasound2-dev libxdo-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libsoup-3.0-dev libssl-dev \
            libglib2.0-dev libpango1.0-dev \
            libcairo2-dev libgdk-pixbuf-2.0-dev \
            nodejs npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install dioxus-cli
        run: cargo install dioxus-cli --locked

      - name: Install Node deps
        run: npm install

      - name: Build CSS
        run: npx @tailwindcss/cli -i ./tailwind.css -o ./crates/kopuz/assets/tailwind.css --content './crates/kopuz/**/*.rs,./crates/components/**/*.rs,./crates/pages/**/*.rs,./crates/hooks/**/*.rs,./crates/player/**/*.rs,./crates/reader/**/*.rs'

      - name: Build binary
        run: dx build --package kopuz --release

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          APPDIR="target/dx/kopuz/release/linux/app"
          STAGE="kopuz-${VERSION}-x86_64-linux"

          mkdir -p "$STAGE"
          cp "$APPDIR/kopuz" "$STAGE/"
          cp -r "$APPDIR/assets" "$STAGE/"
          cp data/com.temidaradev.kopuz.desktop "$STAGE/"
          cp data/com.temidaradev.kopuz.metainfo.xml "$STAGE/"
          cp crates/kopuz/assets/logo-512.png "$STAGE/icon.png"

          tar -czf "${STAGE}.tar.gz" -C "$STAGE" .
          echo "Built ${STAGE}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kopuz-linux-tarball-${{ github.ref_name }}
          path: kopuz-*-x86_64-linux.tar.gz

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: kopuz-*-x86_64-linux.tar.gz
